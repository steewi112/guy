<!-- ================= LOGIN MODAL REVISI ================= -->

<div class="modal" id="loginModal">

  <div class="modal-box">

    <h2>Login CS2 Account</h2>

    <input type="text" id="username" placeholder="Username">

    <input type="email" id="email" placeholder="Email">

    <input type="text" id="tradeLink" placeholder="Steam Trade Link">

    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">
      Login
    </button>

  </div>

</div>

<!-- ================= CSS ================= -->

<style>

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:3000;
}

.modal-box{
  background:#111827;
  width:400px;
  padding:35px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.08);
}

.modal-box h2{
  color:#38bdf8;
  margin-bottom:20px;
  text-align:center;
}

.modal-box input{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  outline:none;
}

.modal-box input:focus{
  border:1px solid #38bdf8;
}

.modal-box button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.modal-box button:hover{
  opacity:0.9;
}

@media(max-width:768px){

  .modal-box{
    width:90%;
  }

}

</style>

<!-- ================= JAVASCRIPT ================= -->

<script>

/* OPEN LOGIN */

function openLogin(){

  document.getElementById("loginModal")
  .style.display = "flex";

}

/* LOGIN */

function login(){

  const username =
  document.getElementById("username").value;

  const email =
  document.getElementById("email").value;

  const tradeLink =
  document.getElementById("tradeLink").value;

  const password =
  document.getElementById("password").value;

  if(
    username.trim() === "" ||
    email.trim() === "" ||
    tradeLink.trim() === "" ||
    password.trim() === ""
  ){

    alert("Semua data harus diisi");
    return;

  }

  /* SAVE ACCOUNT */

  localStorage.setItem(
    "cs2_username",
    username
  );

  localStorage.setItem(
    "cs2_email",
    email
  );

  localStorage.setItem(
    "cs2_tradeLink",
    tradeLink
  );

  /* CLOSE MODAL */

  document.getElementById("loginModal")
  .style.display = "none";

  /* CHANGE LOGIN BUTTON */

  const loginBtn =
  document.querySelector(".login-btn");

  if(loginBtn){

    loginBtn.innerText =
    username;

  }

  alert("Login berhasil");

}

/* AUTO LOGIN */

window.onload = function(){

  const savedUser =
  localStorage.getItem("cs2_username");

  if(savedUser){

    const loginBtn =
    document.querySelector(".login-btn");

    if(loginBtn){

      loginBtn.innerText =
      savedUser;

    }

  }

}

/* CLOSE MODAL WHEN CLICK OUTSIDE */

window.onclick = function(e){

  const modal =
  document.getElementById("loginModal");

  if(e.target == modal){

    modal.style.display = "none";

  }

}

</script>
